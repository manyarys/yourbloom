<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom From Within · yourbloom.site</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   CONFIGURATION — edit these to customize
══════════════════════════════════════════ */
:root {
  /* ⬇ Set your Stripe payment link here */
  --payment-url: "#buy";

  /* ⬇ Deadline for the countdown timer (ISO format) */
  --deadline: "2026-03-31T23:59:59";

  /* ⬇ Price display */
  --price: "$97";
  --price-original: "$147";

  /* Colors */
  --cream: #f7f3ed;
  --green: #3d5a47;
  --green-light: #5a7d62;
  --green-pale: #e8f0e9;
  --brown: #8b6b4a;
  --brown-pale: #f0e8de;
  --dark: #1c1a17;
  --text: #2e2a24;
  --muted: #7a7268;
  --gold: #b8965a;
  --white: #fffefb;

  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Jost', system-ui, sans-serif;
}

/* ══ RESET ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--cream);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  line-height: 1.7;
  overflow-x: hidden;
}

/* ══ GRAIN TEXTURE ══ */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none !important;
  z-index: -1;
  opacity: 0.4;
}

/* ══ LANGUAGE TOGGLE ══ */
.lang-bar {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--dark);
  display: flex; justify-content: flex-end;
  padding: 0.5rem 1.5rem;
  z-index: 100;
  gap: 0.3rem;
}
.lang-toggle {
  background: none; border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.5); border-radius: 20px;
  padding: 0.25rem 0.8rem; font-family: var(--sans);
  font-size: 0.7rem; letter-spacing: 0.1em;
  cursor: pointer; transition: all 0.2s;
}
.lang-toggle.active { background: rgba(255,255,255,0.12); color: white; border-color: rgba(255,255,255,0.4); }

/* ══ SCROLL REVEAL ══ */
.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.75s ease, transform 0.75s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }

/* ══ SECTIONS ══ */
section { position: relative; }

/* ══════════════════════════════════════════
   HERO
══════════════════════════════════════════ */
.hero {
  min-height: 100svh;
  background: var(--dark);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 6rem 1.5rem 4rem;
  position: relative;
  overflow: hidden;
}

/* Organic blobs */
.hero::before, .hero::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.18;
  pointer-events: none;
}
.hero::before {
  width: 500px; height: 500px;
  background: var(--green);
  top: -100px; right: -100px;
}
.hero::after {
  width: 400px; height: 400px;
  background: var(--brown);
  bottom: -80px; left: -80px;
}

.hero-tag {
  font-family: var(--sans);
  font-size: 0.68rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fadeUp 1s ease 0.3s forwards;
}
.hero h1 {
  font-family: var(--serif);
  font-size: clamp(2.8rem, 8vw, 5.5rem);
  font-weight: 700;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 0.5rem;
  opacity: 0;
  animation: fadeUp 1s ease 0.5s forwards;
}
.hero h1 em {
  font-style: italic;
  color: var(--gold);
}
.hero-sub {
  font-family: var(--serif);
  font-size: clamp(1rem, 3vw, 1.35rem);
  font-weight: 400; font-style: italic;
  color: rgba(255,255,255,0.55);
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fadeUp 1s ease 0.7s forwards;
}
.hero-desc {
  max-width: 520px;
  font-size: 0.95rem;
  color: rgba(255,255,255,0.45);
  font-weight: 300;
  line-height: 1.8;
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fadeUp 1s ease 0.9s forwards;
}
.hero-cta {
  display: flex; flex-direction: column;
  align-items: center; gap: 0.8rem;
  opacity: 1;
}
.btn-primary {
  display: inline-block;
  background: var(--green);
  color: white;
  font-family: var(--sans);
  font-size: 0.85rem; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 1rem 2.5rem;
  border-radius: 60px;
  text-decoration: none;
  border: none; cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 8px 32px rgba(61,90,71,0.4);
}
.btn-primary:hover {
  background: var(--green-light);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(61,90,71,0.5);
}
.btn-ghost {
  display: inline-block;
  color: rgba(255,255,255,0.4);
  font-family: var(--sans);
  font-size: 0.8rem;
  text-decoration: none;
  letter-spacing: 0.05em;
  transition: color 0.2s;
}
.btn-ghost:hover { color: rgba(255,255,255,0.8); }

/* Scroll indicator */
.scroll-hint {
  position: absolute; bottom: 2rem;
  left: 0; right: 0;
  display: flex; flex-direction: column;
  align-items: center; gap: 0.4rem;
  opacity: 0;
  animation: fadeUp 1s ease 1.5s forwards;
}
.scroll-hint span {
  font-family: var(--sans);
  font-size: 0.62rem; font-weight: 400;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(255,255,255,0.25);
}
.scroll-line {
  width: 1px; height: 40px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
  animation: scrollPulse 2s ease infinite;
}
@keyframes scrollPulse {
  0%, 100% { opacity: 0.3; transform: scaleY(1); }
  50% { opacity: 1; transform: scaleY(1.2); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════════
   DEADLINE TIMER
══════════════════════════════════════════ */
.timer-section {
  background: var(--green);
  padding: 1.2rem 1.5rem;
  text-align: center;
}
.timer-inner {
  display: flex; flex-wrap: wrap;
  align-items: center; justify-content: center;
  gap: 0.5rem 1.5rem;
}
.timer-label {
  font-family: var(--sans);
  font-size: 0.72rem; font-weight: 500;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(255,255,255,0.7);
}
.timer-digits {
  display: flex; gap: 0.5rem; align-items: center;
}
.timer-block {
  text-align: center;
}
.timer-num {
  font-family: var(--serif);
  font-size: 1.8rem; font-weight: 700;
  color: white; line-height: 1;
  min-width: 2.2rem;
  display: block;
}
.timer-unit {
  font-family: var(--sans);
  font-size: 0.55rem; font-weight: 400;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}
.timer-sep { color: rgba(255,255,255,0.3); font-size: 1.2rem; margin-bottom: 0.8rem; }

/* ══════════════════════════════════════════
   PAIN POINTS
══════════════════════════════════════════ */
.pain-section {
  padding: 5rem 1.5rem;
  background: var(--white);
}
.pain-inner { max-width: 640px; margin: 0 auto; }
.section-eyebrow {
  font-family: var(--sans);
  font-size: 0.65rem; font-weight: 500;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1rem;
}
.section-title {
  font-family: var(--serif);
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 700; line-height: 1.2;
  color: var(--dark);
  margin-bottom: 1.5rem;
}
.section-title em { font-style: italic; color: var(--green); }
.pain-list {
  list-style: none;
  margin: 2rem 0;
}
.pain-list li {
  display: flex; align-items: flex-start;
  gap: 0.8rem;
  padding: 0.7rem 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  font-size: 0.95rem; color: var(--text);
}
.pain-list li:last-child { border-bottom: none; }
.pain-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  margin-top: 0.55rem;
}
.pain-cta-text {
  font-family: var(--serif);
  font-size: 1.1rem; font-style: italic;
  color: var(--muted);
  margin-top: 1.5rem;
  padding-left: 1rem;
  border-left: 2px solid var(--gold);
}

/* ══════════════════════════════════════════
   ABOUT (YOUR STORY)
══════════════════════════════════════════ */
.about-section {
  padding: 5rem 1.5rem;
  background: var(--brown-pale);
}
.about-inner {
  max-width: 640px; margin: 0 auto;
}
.about-card {
  background: var(--white);
  border-radius: 24px;
  padding: 2.5rem 2rem;
  box-shadow: 0 4px 40px rgba(0,0,0,0.06);
}
.about-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--green-pale);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  margin-bottom: 1.2rem;
  border: 3px solid white;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.about-name {
  font-family: var(--serif);
  font-size: 1.3rem; font-weight: 700;
  color: var(--dark);
  margin-bottom: 0.2rem;
}
.about-role {
  font-family: var(--sans);
  font-size: 0.72rem; font-weight: 400;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.2rem;
}
.about-text {
  font-size: 0.95rem; line-height: 1.85;
  color: var(--text);
}
.about-text p { margin-bottom: 0.8rem; }
.about-text p:last-child { margin-bottom: 0; }

/* ══════════════════════════════════════════
   WHAT'S INSIDE
══════════════════════════════════════════ */
.inside-section {
  padding: 5rem 1.5rem;
  background: var(--cream);
}
.inside-inner { max-width: 680px; margin: 0 auto; }
.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
  margin-top: 2.5rem;
}
.module-card {
  background: var(--white);
  border-radius: 20px;
  padding: 1.8rem 1.5rem;
  border: 1px solid rgba(0,0,0,0.06);
  transition: transform 0.25s, box-shadow 0.25s;
}
.module-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
.module-num {
  font-family: var(--serif);
  font-size: 2.5rem; font-weight: 700;
  line-height: 1; margin-bottom: 0.8rem;
  opacity: 0.08; color: var(--dark);
}
.module-week {
  font-family: var(--sans);
  font-size: 0.62rem; font-weight: 500;
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-bottom: 0.3rem;
}
.module-title {
  font-family: var(--serif);
  font-size: 1.15rem; font-weight: 700;
  color: var(--dark); margin-bottom: 0.3rem;
}
.module-sub {
  font-family: var(--serif);
  font-size: 0.88rem; font-style: italic;
  color: var(--muted); margin-bottom: 0.8rem;
}
.module-desc {
  font-size: 0.85rem; color: var(--muted);
  line-height: 1.7;
}

.daily-box {
  margin-top: 2rem;
  background: var(--green);
  border-radius: 20px;
  padding: 2rem 1.8rem;
  color: white;
}
.daily-box h3 {
  font-family: var(--serif);
  font-size: 1.2rem; font-weight: 700;
  margin-bottom: 1rem;
}
.daily-items {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 0.8rem;
}
.daily-item {
  text-align: center;
  background: rgba(255,255,255,0.1);
  border-radius: 14px; padding: 1rem 0.5rem;
}
.daily-item .di-icon { font-size: 1.4rem; margin-bottom: 0.3rem; }
.daily-item .di-label {
  font-family: var(--sans);
  font-size: 0.72rem; font-weight: 400;
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.05em;
}

/* ══════════════════════════════════════════
   FOR WHOM
══════════════════════════════════════════ */
.whom-section {
  padding: 5rem 1.5rem;
  background: var(--dark);
  color: white;
}
.whom-inner { max-width: 640px; margin: 0 auto; }
.whom-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-top: 2.5rem;
}
.whom-card {
  border-radius: 18px;
  padding: 1.5rem;
}
.whom-card.yes {
  background: rgba(90,125,98,0.15);
  border: 1px solid rgba(90,125,98,0.3);
}
.whom-card.no {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
}
.whom-card h4 {
  font-family: var(--sans);
  font-size: 0.68rem; font-weight: 500;
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-bottom: 0.8rem;
}
.whom-card.yes h4 { color: #7fcf8a; }
.whom-card.no h4 { color: rgba(255,255,255,0.3); }
.whom-card ul { list-style: none; }
.whom-card ul li {
  font-size: 0.85rem; line-height: 1.6;
  padding: 0.3rem 0;
  color: rgba(255,255,255,0.7);
  display: flex; gap: 0.5rem;
}
.whom-card.yes ul li::before { content: '✓'; color: #7fcf8a; flex-shrink: 0; }
.whom-card.no ul li::before { content: '×'; color: rgba(255,255,255,0.2); flex-shrink: 0; }

/* ══════════════════════════════════════════
   TESTIMONIALS
══════════════════════════════════════════ */
.testimonials-section {
  padding: 5rem 1.5rem;
  background: var(--green-pale);
}
.testimonials-inner { max-width: 680px; margin: 0 auto; }
.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
  margin-top: 2.5rem;
}
.testimonial-card {
  background: var(--white);
  border-radius: 20px;
  padding: 1.8rem 1.5rem;
  position: relative;
  box-shadow: 0 2px 20px rgba(0,0,0,0.05);
}
.testimonial-quote {
  font-family: var(--serif);
  font-size: 3rem; line-height: 0.5;
  color: var(--green);
  opacity: 0.2;
  margin-bottom: 0.8rem;
}
.testimonial-text {
  font-family: var(--serif);
  font-size: 0.97rem; font-style: italic;
  line-height: 1.8; color: var(--text);
  margin-bottom: 1.2rem;
}
.testimonial-author {
  display: flex; align-items: center; gap: 0.7rem;
}
.testimonial-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--green-pale);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}
.testimonial-name {
  font-family: var(--sans);
  font-size: 0.8rem; font-weight: 500;
  color: var(--dark);
}
.testimonial-loc {
  font-family: var(--sans);
  font-size: 0.7rem; color: var(--muted);
}
.testimonial-placeholder {
  font-family: var(--sans);
  font-size: 0.72rem; color: var(--muted);
  font-style: italic; text-align: center;
  padding: 2rem;
  background: rgba(0,0,0,0.02);
  border-radius: 12px;
  border: 1.5px dashed rgba(0,0,0,0.1);
  margin-top: 1rem;
}

/* ══════════════════════════════════════════
   PRICING
══════════════════════════════════════════ */
.pricing-section {
  padding: 5rem 1.5rem;
  background: var(--cream);
}
.pricing-inner { max-width: 520px; margin: 0 auto; text-align: center; }
.pricing-card {
  background: var(--dark);
  border-radius: 28px;
  padding: 3rem 2rem;
  margin-top: 2rem;
  position: relative;
  overflow: hidden;
}
.pricing-card::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: var(--green);
  border-radius: 50%;
  opacity: 0.12;
  filter: blur(40px);
}
.pricing-badge {
  display: inline-block;
  background: var(--gold);
  color: var(--dark);
  font-family: var(--sans);
  font-size: 0.65rem; font-weight: 500;
  letter-spacing: 0.15em; text-transform: uppercase;
  padding: 0.3rem 1rem; border-radius: 20px;
  margin-bottom: 1.5rem;
}
.pricing-name {
  font-family: var(--serif);
  font-size: 1.5rem; font-weight: 700;
  color: white; margin-bottom: 0.3rem;
}
.pricing-sub {
  font-family: var(--serif);
  font-style: italic; font-size: 0.95rem;
  color: rgba(255,255,255,0.4);
  margin-bottom: 2rem;
}
.pricing-amount {
  display: flex; align-items: baseline;
  justify-content: center; gap: 0.5rem;
  margin-bottom: 0.5rem;
}
.price-current {
  font-family: var(--serif);
  font-size: 3.5rem; font-weight: 700;
  color: white; line-height: 1;
}
.price-original {
  font-family: var(--sans);
  font-size: 1rem; color: rgba(255,255,255,0.3);
  text-decoration: line-through;
}
.price-note {
  font-family: var(--sans);
  font-size: 0.75rem; color: rgba(255,255,255,0.35);
  margin-bottom: 2rem;
}
.includes-list {
  list-style: none;
  text-align: left;
  margin-bottom: 2rem;
}
.includes-list li {
  display: flex; gap: 0.7rem;
  font-size: 0.88rem; color: rgba(255,255,255,0.75);
  padding: 0.5rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.includes-list li:last-child { border-bottom: none; }
.includes-list li::before { content: '✦'; color: var(--gold); flex-shrink: 0; font-size: 0.7rem; margin-top: 0.2rem; }
.btn-buy {
  display: block; width: 100%;
  background: white; color: var(--dark);
  font-family: var(--sans); font-size: 0.85rem;
  font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 1.1rem 2rem; border-radius: 60px;
  text-decoration: none; border: none; cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.btn-buy:hover {
  background: var(--cream);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}
.guarantee {
  display: flex; align-items: center;
  justify-content: center; gap: 0.5rem;
  margin-top: 1.2rem;
  font-family: var(--sans);
  font-size: 0.75rem; color: rgba(255,255,255,0.3);
}

/* ══════════════════════════════════════════
   FAQ
══════════════════════════════════════════ */
.faq-section {
  padding: 5rem 1.5rem;
  background: var(--white);
}
.faq-inner { max-width: 600px; margin: 0 auto; }
.faq-list { margin-top: 2.5rem; }
.faq-item {
  border-bottom: 1px solid rgba(0,0,0,0.08);
}
.faq-q {
  width: 100%; background: none; border: none;
  text-align: left; cursor: pointer;
  display: flex; justify-content: space-between;
  align-items: center; gap: 1rem;
  padding: 1.2rem 0;
  font-family: var(--serif);
  font-size: 1rem; font-weight: 400;
  color: var(--dark);
  transition: color 0.2s;
}
.faq-q:hover { color: var(--green); }
.faq-arrow {
  font-size: 1rem; color: var(--gold);
  transition: transform 0.3s;
  flex-shrink: 0;
}
.faq-item.open .faq-arrow { transform: rotate(45deg); }
.faq-a {
  font-size: 0.9rem; color: var(--muted);
  line-height: 1.8;
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s ease, padding 0.3s ease;
}
.faq-item.open .faq-a {
  max-height: 300px;
  padding-bottom: 1.2rem;
}

/* ══════════════════════════════════════════
   FINAL CTA
══════════════════════════════════════════ */
.final-cta {
  padding: 6rem 1.5rem;
  background: var(--green);
  text-align: center;

      { q: "¿Cómo accedo al programa tras la compra?", a: "Después del pago con Stripe recibirás un enlace a tu página personal del programa. Puedes acceder desde cualquier dispositivo — teléfono, tableta u ordenador — en cualquier momento." },
      { q: "¿Hay política de reembolso?", a: "Sí. Si dentro de los 7 días sientes que el programa no es para ti, escríbenos y te devolvemos el pago completo — sin preguntas." },
    ],
  }
};

// ════════════════════════════════════════
// LANGUAGE SYSTEM
// ════════════════════════════════════════
let lang = 'en';

function scrollTo_(e, id) {
  e.preventDefault();
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  // Update hardcoded timer labels for language switch
  var timerLbl = document.getElementById('timer-label-text');
  if (timerLbl) timerLbl.textContent = l === 'en' ? 'Early access closes in' : 'El acceso anticipado cierra en';
  var daysLbl = document.getElementById('t-days-lbl');
  if (daysLbl) daysLbl.textContent = l === 'en' ? 'days' : 'días';
  // Update hardcoded button texts
  var heroBtn = document.getElementById('hero-cta-btn');
  if (heroBtn) heroBtn.textContent = l === 'en' ? 'Begin Your Journey →' : 'Comenzar Mi Camino →';
  var ghostBtn = document.getElementById('hero-ghost-btn');
  if (ghostBtn) ghostBtn.textContent = l === 'en' ? "See what's included ↓" : 'Ver qué incluye ↓';

  // Update all data-en / data-es elements
  document.querySelectorAll('[data-en]').forEach(el => {
    const txt = el.getAttribute('data-' + l);
    if (txt !== null) el.innerHTML = txt;
  });

  // Re-render dynamic content
  renderAll();
}

function renderAll() {
  const c = CONTENT[lang];

  // Pain list
  document.getElementById('pain-list').innerHTML =
    c.pain.map(p => `<li><span class="pain-dot"></span>${p}</li>`).join('');

  // About text
  document.getElementById('about-text').innerHTML = c.about;

  // Modules
  document.getElementById('modules-grid').innerHTML = c.modules.map(m => `
    <div class="module-card">
      <div class="module-num">${m.num}</div>
      <div class="module-week">${m.week}</div>
      <div class="module-title">${m.title}</div>
      <div class="module-sub">${m.sub}</div>
      <div class="module-desc">${m.desc}</div>
    </div>`).join('');

  // Whom
  document.getElementById('whom-grid').innerHTML = `
    <div class="whom-card yes">
      <h4>${lang === 'en' ? 'This is for you if' : 'Es para ti si'}</h4>
      <ul>${c.whom_yes.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>
    <div class="whom-card no">
      <h4>${lang === 'en' ? 'Not the right fit if' : 'No es para ti si'}</h4>
      <ul>${c.whom_no.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>`;

  // Testimonials
  document.getElementById('testimonials-grid').innerHTML =
    c.testimonials.map(t => `
      <div class="testimonial-card">
        <div class="testimonial-quote">"</div>
        <p class="testimonial-text">${t.text}</p>
        <div class="testimonial-author">
          <div class="testimonial-avatar">${t.emoji}</div>
          <div>
            <div class="testimonial-name">${t.name}</div>
            <div class="testimonial-loc">${t.loc}</div>
          </div>
        </div>
      </div>`).join('');
  document.getElementById('testimonial-placeholder').textContent = c.placeholder;

  // Includes
  document.getElementById('includes-list').innerHTML =
    c.includes.map(i => `<li>${i}</li>`).join('');

  // Buy button text
  document.getElementById('buy-btn').textContent =
    lang === 'en' ? 'Start my 30 days →' : 'Comenzar mis 30 días →';

  // FAQ
  document.getElementById('faq-list').innerHTML =
    c.faqs.map((f, i) => `
      <div class="faq-item" id="faq-${i}">
        <button class="faq-q" onclick="toggleFaq(${i})">
          ${f.q}
          <span class="faq-arrow">+</span>
        </button>
        <div class="faq-a">${f.a}</div>
      </div>`).join('');
}

function toggleFaq(i) {
  const item = document.getElementById('faq-' + i);
  item.classList.toggle('open');
}

// ════════════════════════════════════════
// COUNTDOWN TIMER
// ════════════════════════════════════════
// ⬇ Edit this date to your actual deadline
const DEADLINE = new Date('2026-03-31T23:59:59');

function updateTimer() {
  const now = new Date();
  const diff = DEADLINE - now;
  if (diff <= 0) {
    ['t-days','t-hours','t-mins','t-secs'].forEach(id => {
      document.getElementById(id).textContent = '00';
    });
    return;
  }
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000) / 60000);
  const secs  = Math.floor((diff % 60000) / 1000);
  document.getElementById('t-days').textContent  = String(days).padStart(2,'0');
  document.getElementById('t-hours').textContent = String(hours).padStart(2,'0');
  document.getElementById('t-mins').textContent  = String(mins).padStart(2,'0');
  document.getElementById('t-secs').textContent  = String(secs).padStart(2,'0');
}
try { setInterval(updateTimer, 1000); updateTimer(); } catch(e) { console.error("Timer error:", e); }

// ════════════════════════════════════════
// SCROLL REVEAL
// ════════════════════════════════════════
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.12 });

function initReveal() {
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
// Fix: call immediately since script is at bottom of body
// Wrap in try/catch so errors are visible, not silent blank page
// setLang triggers data-en/data-es attribute rendering AND renderAll
// Without this call, all data-en elements stay blank on first load
try {
  setLang('en');
} catch(e) {
  console.error('setLang failed:', e);
  // Hard fallback: manually populate all data-en elements
  document.querySelectorAll('[data-en]').forEach(function(el) {
    el.innerHTML = el.getAttribute('data-en') || '';
  });
  try { renderAll(); } catch(e2) { console.error('renderAll also failed:', e2); }
}

// Init scroll reveal after tiny delay to ensure layout is painted
setTimeout(initReveal, 150);

// Safety net: also run on DOMContentLoaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() {
    renderAll();
    setTimeout(initReveal, 150);
  });
}

// ════════════════════════════════════════
// CLOUD SYNC (Google Sheets)
// ════════════════════════════════════════
const CLOUD_URL = "https://yourbloom.site/api/progress";

async function saveToCloud() {
  const userEmail = localStorage.getItem('user_email');
  if (!userEmail) return;
  const progress = localStorage.getItem('bloom_progress');
  if (!progress) return;
  try {
    await fetch(CLOUD_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({
        user_id: userEmail,
        answers: progress
      })
    });
  } catch (e) {
    console.error("Sync error:", e);
  }
}

function updateProgress(data) {
  localStorage.setItem('bloom_progress', JSON.stringify(data));
  saveToCloud();
}
</script>
