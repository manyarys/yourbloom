<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Choose Myself · Yo Me Elijo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --dark: #1a1614;
  --m1: #4a6ec2; --m1bg: #e8f0fa;
  --m2: #c2566a; --m2bg: #fdf0f0;
  --m3: #a07840; --m3bg: #f5f0e8;
  --m4: #4a9e87; --m4bg: #e8f4f0;
  --gold: #c8a96e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #faf8f5; font-family: 'Georgia', serif; min-height: 100vh; overflow-x: hidden; }

/* ── ONBOARDING SCREEN ── */
#onboarding {
  position: fixed; inset: 0; background: var(--dark);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; padding: 2rem;
}
#onboarding h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; color: white; text-align: center; line-height: 1.2; margin-bottom: 0.4rem; }
#onboarding .sub { font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 0.8rem; color: rgba(255,255,255,0.4); letter-spacing: 0.15em; text-align: center; margin-bottom: 2.5rem; }
.onboard-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 1.8rem; width: 100%; max-width: 420px; margin-bottom: 1rem; }
.onboard-label { font-family: 'DM Sans', sans-serif; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 0.7rem; }
.lang-btns { display: flex; gap: 0.5rem; }
.lang-btn { flex: 1; padding: 0.7rem; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.6); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
.lang-btn.sel { border-color: var(--gold); color: var(--gold); background: rgba(200,169,110,0.1); }
.name-input, .date-input { width: 100%; background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 0.75rem 1rem; color: white; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border 0.2s; }
.name-input:focus, .date-input:focus { border-color: rgba(255,255,255,0.35); }
.name-input::placeholder { color: rgba(255,255,255,0.25); }
.start-btn { width: 100%; max-width: 420px; padding: 1rem; background: var(--gold); border: none; border-radius: 16px; color: var(--dark); font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em; touch-action: manipulation; -webkit-tap-highlight-color: transparent; min-height: 52px; }
.start-btn:hover { opacity: 0.88; transform: translateY(-1px); }

/* ── MAIN APP ── */
#app { display: none; }

/* ── HEADER ── */
.header { background: var(--dark); color: white; padding: 1.5rem 1.5rem 0; }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
.header-left h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; line-height: 1.1; }
.header-left .greeting { font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 0.78rem; color: rgba(255,255,255,0.45); letter-spacing: 0.06em; margin-bottom: 0.2rem; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; }

/* TODAY BADGE */
.today-badge { background: rgba(200,169,110,0.15); border: 1px solid rgba(200,169,110,0.3); border-radius: 12px; padding: 0.4rem 0.8rem; text-align: center; }
.today-badge .day-label { font-family: 'DM Sans', sans-serif; font-size: 0.6rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }
.today-badge .day-num { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; color: var(--gold); line-height: 1; }

/* STREAK */
.streak-badge { display: flex; align-items: center; gap: 0.3rem; background: rgba(255,255,255,0.06); border-radius: 10px; padding: 0.35rem 0.65rem; }
.streak-badge .fire { font-size: 0.9rem; }
.streak-badge .streak-num { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: #ff9e4a; line-height: 1; }
.streak-badge .streak-label { font-family: 'DM Sans', sans-serif; font-size: 0.6rem; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; }

/* SOUND CONTROLS */
.sound-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 0; }
.sound-btn { background: rgba(255,255,255,0.08); border: none; border-radius: 8px; padding: 0.35rem 0.7rem; color: rgba(255,255,255,0.6); font-family: 'DM Sans', sans-serif; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.3rem; }
.sound-btn.active { background: rgba(200,169,110,0.2); color: var(--gold); }
.vol-slider { -webkit-appearance: none; width: 80px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.2); outline: none; cursor: pointer; }
.vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--gold); cursor: pointer; }

/* PROGRESS */
.prog-section { padding: 0.8rem 0 0; }
.prog-label { font-family: 'DM Sans', sans-serif; font-size: 0.68rem; color: rgba(255,255,255,0.35); display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
.prog-outer { height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
.prog-inner { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #c2566a, #4a9e87); transition: width 0.7s ease; }

/* ── TABS ── */
.tabs { background: var(--dark); display: flex; gap: 0.3rem; padding: 0.7rem 1.5rem 0.8rem; overflow-x: auto; }
.tab { padding: 0.38rem 0.9rem; border-radius: 20px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.73rem; white-space: nowrap; transition: all 0.2s; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.45); }
.tab.active { background: white; color: var(--dark); font-weight: 500; }

/* ── CONTENT ── */
.content { max-width: 560px; margin: 0 auto; padding: 1.2rem 1.2rem 4rem; }

/* ── FILTER ── */
.filter-row { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 1rem; }
.filter-btn { padding: 0.32rem 0.8rem; border-radius: 20px; border: 1px solid rgba(0,0,0,0.11); background: white; color: #666; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; }
.filter-btn.active { background: var(--dark); color: white; border-color: var(--dark); }

/* ── TODAY HIGHLIGHT ── */
.today-card-wrapper { position: relative; }
.today-glow { position: absolute; inset: -2px; border-radius: 18px; background: linear-gradient(135deg, var(--gold), transparent 60%); opacity: 0.35; pointer-events: none; z-index: 0; }

/* ── DAY CARD ── */
.day-card { border-radius: 16px; border: 1px solid rgba(0,0,0,0.07); margin-bottom: 0.65rem; overflow: hidden; cursor: pointer; transition: all 0.25s; position: relative; z-index: 1; }
.day-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.1); transform: translateY(-1px); }
.day-card.done { opacity: 0.45; }
.day-card.locked { opacity: 0.4; cursor: default; }

.day-head { display: flex; align-items: center; gap: 0.8rem; padding: 0.95rem 1.1rem; }
.day-num { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; opacity: 0.2; min-width: 2rem; line-height: 1; }
.day-emoji { font-size: 1.35rem; }
.day-info { flex: 1; }
.day-title { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: #1a1614; line-height: 1.2; }
.day-tag { font-family: 'DM Sans', sans-serif; font-size: 0.62rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.4; margin-top: 0.1rem; }
.day-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; cursor: pointer; font-size: 0.65rem; color: white; }
.lock-icon { font-size: 0.8rem; opacity: 0.3; flex-shrink: 0; }

/* ── DAY BODY ── */
.day-body { padding: 0 1.1rem 1.1rem; display: none; }
.day-body.open { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }

.section-label { font-family: 'DM Sans', sans-serif; font-size: 0.6rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.38; margin: 0.9rem 0 0.35rem; }
.theory-text { font-family: 'Cormorant Garamond', serif; font-size: 0.97rem; line-height: 1.78; color: #2a2520; font-style: italic; }
.practice-text { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; line-height: 1.65; color: #2a2520; font-weight: 300; }
.reflection-q { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; line-height: 1.5; color: #2a2520; font-weight: 300; font-style: italic; opacity: 0.65; margin-bottom: 0.5rem; }

/* ── TIMER ── */
.timer-box { background: rgba(0,0,0,0.04); border-radius: 12px; padding: 0.8rem 1rem; margin: 0.8rem 0; display: flex; align-items: center; gap: 0.8rem; }
.timer-display { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: #1a1614; min-width: 4rem; }
.timer-ctrl { background: var(--dark); color: white; border: none; border-radius: 8px; padding: 0.4rem 0.9rem; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
.timer-ctrl:hover { opacity: 0.8; }
.timer-label { font-family: 'DM Sans', sans-serif; font-size: 0.65rem; color: #888; letter-spacing: 0.08em; }

textarea { width: 100%; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.7); border-radius: 10px; padding: 0.65rem 0.85rem; font-family: 'DM Sans', sans-serif; font-size: 0.84rem; font-weight: 300; color: #1a1614; resize: none; outline: none; min-height: 80px; line-height: 1.5; }
textarea:focus { border-color: rgba(0,0,0,0.25); background: white; }

.done-btn { border: none; border-radius: 20px; padding: 0.55rem 1.3rem; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; cursor: pointer; margin-top: 0.8rem; transition: all 0.2s; font-weight: 400; }

/* ── OVERVIEW ── */
.stats-row { display: flex; gap: 0.7rem; margin-bottom: 1.5rem; }
.stat-box { flex: 1; background: white; border-radius: 14px; padding: 0.9rem 0.8rem; border: 1px solid rgba(0,0,0,0.07); }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: #1a1614; line-height: 1; }
.stat-label { font-family: 'DM Sans', sans-serif; font-size: 0.63rem; font-weight: 300; color: #888; margin-top: 0.15rem; }
.module-sec-label { font-family: 'DM Sans', sans-serif; font-size: 0.62rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; }
.module-sec-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: #1a1614; margin-bottom: 0.5rem; }
.ov-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.35rem; margin-bottom: 1.2rem; }
.ov-cell { aspect-ratio: 1; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(0,0,0,0.06); }
.ov-cell:hover { transform: scale(1.08); }
.ov-cell.locked-cell { opacity: 0.3; cursor: default; }

/* ── CONFETTI OVERLAY ── */
#confetti-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 9999; display: none; }
.confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall 1.2s ease-in forwards; }
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ── COMPLETION BANNER ── */
.complete-banner { background: linear-gradient(135deg, #1a1614, #2a2520); border-radius: 18px; padding: 1.5rem; text-align: center; margin-bottom: 1rem; border: 1px solid rgba(200,169,110,0.25); }
.complete-banner .crown { font-size: 2rem; margin-bottom: 0.5rem; }
.complete-banner h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; color: var(--gold); margin-bottom: 0.3rem; }
.complete-banner p { font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 0.82rem; color: rgba(255,255,255,0.5); line-height: 1.6; }

/* ── SETTINGS ── */
.settings-section { background: white; border-radius: 16px; padding: 1.2rem; border: 1px solid rgba(0,0,0,0.07); margin-bottom: 1rem; }
.settings-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: #1a1614; margin-bottom: 1rem; }
.settings-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
.settings-row:last-child { border-bottom: none; }
.settings-key { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: #444; }
.settings-val { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: #888; }
.reset-btn { width: 100%; padding: 0.7rem; border-radius: 12px; border: 1.5px solid rgba(200,0,0,0.2); background: transparent; color: #c05050; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; }
.reset-btn:hover { background: rgba(200,0,0,0.05); }

.hidden { display: none !important; }
</style>

<!-- ══════════════════════════════════════════════
     ONBOARDING
══════════════════════════════════════════════ -->
<div id="onboarding">
  <h1 id="ob-title">I Choose Myself</h1>
  <p class="sub" id="ob-sub" style="display:none"></p>

  <div class="onboard-card">
    <div class="onboard-label" id="ob-lang-label">Language / Idioma</div>
    <div class="lang-btns">
      <button class="lang-btn sel" id="btn-en" onclick="selectLang('en')">🇺🇸 English</button>
      <button class="lang-btn" id="btn-es" onclick="selectLang('es')">🇪🇸 Español</button>
    </div>
  </div>

  <div class="onboard-card">
    <div class="onboard-label" id="ob-name-label">Your first name</div>
    <input class="name-input" id="ob-name" type="text" placeholder="e.g. Maria" maxlength="30">
  </div>

  <div class="onboard-card">
    <div class="onboard-label" id="ob-date-label">Program start date</div>
    <input class="date-input" id="ob-date" type="date">
  </div>

  <button class="start-btn" id="ob-btn" type="button">Begin my journey →</button>
</div>

<!-- ══════════════════════════════════════════════
     MAIN APP
══════════════════════════════════════════════ -->
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <div class="greeting" id="hdr-greeting"></div>
        <h1 id="hdr-title">I Choose Myself</h1>
      </div>
      <div class="header-right">
        <div class="today-badge">
          <div class="day-label" id="hdr-day-label">TODAY</div>
          <div class="day-num" id="hdr-day-num">1</div>
        </div>
        <div class="streak-badge">
          <span class="fire">🔥</span>
          <span class="streak-num" id="streak-num">0</span>
          <span class="streak-label" id="streak-label">days</span>
        </div>
      </div>
    </div>

    <!-- SOUND -->
    <div class="sound-bar">
      <button class="sound-btn" id="sound-toggle-btn" onclick="toggleSound()">
        <span id="sound-icon">♪</span>
        <span id="sound-label-btn">Ambient</span>
      </button>
      <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="30" oninput="setVolume(this.value)">
      <button class="sound-btn" id="nature-btn" onclick="switchSound('nature')">🌿</button>
      <button class="sound-btn" id="rain-btn" onclick="switchSound('rain')">🌧</button>
      <button class="sound-btn" id="crystal-btn" onclick="switchSound('crystal')">✨</button>
    </div>

    <!-- PROGRESS -->
    <div class="prog-section">
      <div class="prog-label">
        <span id="prog-text-hdr">0 / 30</span>
        <span id="prog-pct-hdr">0%</span>
      </div>
      <div class="prog-outer"><div class="prog-inner" id="prog-bar"></div></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchView('program')" id="tab-program"></button>
    <button class="tab" onclick="switchView('overview')" id="tab-overview"></button>
    <button class="tab" onclick="switchView('settings')" id="tab-settings"></button>
  </div>

  <!-- PROGRAM VIEW -->
  <div id="view-program" class="content">
    <div class="filter-row" id="filter-row"></div>
    <div id="days-container"></div>
  </div>

  <!-- OVERVIEW VIEW -->
  <div id="view-overview" class="content hidden">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="ov-done">0</div><div class="stat-label" id="ov-done-lbl">completed</div></div>
      <div class="stat-box"><div class="stat-num" id="ov-left">30</div><div class="stat-label" id="ov-left-lbl">remaining</div></div>
      <div class="stat-box"><div class="stat-num" id="ov-streak">0</div><div class="stat-label" id="ov-streak-lbl">streak</div></div>
    </div>
    <div id="overview-container"></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div id="view-settings" class="content hidden">
    <div class="settings-section">
      <div class="settings-title" id="settings-title">Settings</div>
      <div class="settings-row">
        <span class="settings-key" id="set-name-lbl">Name</span>
        <span class="settings-val" id="set-name-val"></span>
      </div>
      <div class="settings-row">
        <span class="settings-key" id="set-start-lbl">Start date</span>
        <span class="settings-val" id="set-start-val"></span>
      </div>
      <div class="settings-row">
        <span class="settings-key" id="set-lang-lbl">Language</span>
        <span class="settings-val" id="set-lang-val"></span>
      </div>
      <div class="settings-row">
        <span class="settings-key" id="set-streak-lbl">Current streak</span>
        <span class="settings-val" id="set-streak-val"></span>
      </div>
      <button class="reset-btn" id="reset-btn" onclick="resetProgram()">↺ Reset program</button>
    </div>
  </div>
</div>

<!-- CONFETTI -->
<div id="confetti-overlay"></div>

// ════════════════════════════════════════════════════════════
// PERSISTENCE — token-based синхронизация
// ?token=XXX  — прямая ссылка с токеном
// ?e=email    — ссылка с email, токен создаётся автоматически
// ════════════════════════════════════════════════════════════
const CLOUD_URL = "https://yourbloom.site/api/progress";
const API_BASE  = "https://yourbloom.site/api";

function getToken() {
  const p = new URLSearchParams(window.location.search);
  const t = p.get('token');
  if (t) { localStorage.setItem('bloom_token', t); return t; }
  return localStorage.getItem('bloom_token');
}

// Получить/создать токен по email (для ссылок ?e=email)
async function resolveTokenByEmail(email) {
  try {
    const res = await fetch(API_BASE + '/token-by-email?email=' + encodeURIComponent(email), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('bloom_token', data.token);
      localStorage.setItem('user_email', email);
      return data.token;
    }
  } catch(e) { console.error('resolveToken error:', e); }
  return null;
}

function saveState() {
  state.lastSaved = Date.now();
  localStorage.setItem('icm2_state', JSON.stringify(state));
  const token = getToken();
  if (token) {
    pushToCloud(token);
  } else {
    // Токен ещё не разрезолвился — пробуем через email
    const email = localStorage.getItem('user_email');
    if (email) {
      resolveTokenByEmail(email).then(function(t) {
        if (t) pushToCloud(t);
      });
    }
  }
}

function pushToCloud(token) {
  fetch(CLOUD_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token, progress: state })
  }).then(function(res) {
    if (!res.ok) res.text().then(t => console.error("Sync error:", res.status, t));
  }).catch(function(e) { console.error("Sync error:", e); });
}

function loadState() {
  const saved = localStorage.getItem('icm2_state');
  if (saved) { state = { ...state, ...JSON.parse(saved) }; return true; }
  return false;
}

async function loadFromCloud(token) {
  try {
    const res = await fetch(CLOUD_URL + "?token=" + encodeURIComponent(token), { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (data && data.exists) {
      const cloud = data.progress || { name: '', email: '', completed: {}, notes: {} };
      // Побеждает более свежая версия
      const localRaw = localStorage.getItem('icm2_state');
      const local = localRaw ? JSON.parse(localRaw) : null;
      const cloudTs = cloud.lastSaved || 0;
      const localTs = (local && local.lastSaved) ? local.lastSaved : 0;
      if (!local || cloudTs >= localTs) {
        // Облако новее или нет локального — берём облако
        state = { ...state, ...cloud };
      } else {
        // Локальное новее — используем его и пушим в облако
        state = { ...state, ...local };
        fetch(CLOUD_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, progress: state })
        }).catch(function(e) { console.error("Re-sync:", e); });
      }
      localStorage.setItem('icm2_state', JSON.stringify(state));
      return true;
    }
    // KV пуст — но токен валидный. Проверяем локальный прогресс и пушим его в облако
    if (!data.exists) {
      const localRaw = localStorage.getItem('icm2_state');
      if (localRaw) {
        const local = JSON.parse(localRaw);
        if (local && local.name && local.startDate) {
          state = { ...state, ...local };
          // Пушим локальное в облако — синхронизируем между устройствами
          fetch(CLOUD_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, progress: state })
          }).catch(function(e) { console.error("Push local to cloud:", e); });
          return true;
        }
      }
    }
  } catch(e) { console.log("No cloud data:", e); }
  return false;
}

function startProgram() {
  const nameEl = document.getElementById('ob-name');
  const dateEl = document.getElementById('ob-date');
  const name = nameEl.value.trim();
  const dateVal = dateEl.value;

  // На мобильном .focus() вызывает клавиатуру и глотает тап — показываем ошибку иначе
  if (!name) {
    nameEl.style.borderColor = '#c2566a';
    nameEl.style.boxShadow = '0 0 0 2px rgba(194,86,106,0.3)';
    nameEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => { nameEl.style.borderColor = ''; nameEl.style.boxShadow = ''; }, 2000);
    return;
  }
  if (!dateVal) {
    dateEl.style.borderColor = '#c2566a';
    dateEl.style.boxShadow = '0 0 0 2px rgba(194,86,106,0.3)';
    dateEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => { dateEl.style.borderColor = ''; dateEl.style.boxShadow = ''; }, 2000);
    return;
  }
  state.name = name;
  state.startDate = dateVal;
  // Убеждаемся что токен есть перед сохранением
  const tok = getToken();
  if (tok) {
    saveState();
    launchApp();
  } else {
    const em = localStorage.getItem('user_email');
    if (em) {
      resolveTokenByEmail(em).then(function() {
        saveState();
        launchApp();
      });
    } else {
      saveState();
      launchApp();
    }
  }
}

// ════════════════════════════════════════════════════════════
// TODAY'S DAY NUMBER
// ════════════════════════════════════════════════════════════
function getTodayDayNum() {
  if (!state.startDate) return 1;
  const start = new Date(state.startDate + 'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.floor((today - start) / 86400000) + 1;
  return Math.max(1, Math.min(diff, 30));
}

// ════════════════════════════════════════════════════════════
// STREAK
// ════════════════════════════════════════════════════════════
function updateStreak() {
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  
  // Start counting from today if something done today, else from yesterday
  const todayIso = today.toISOString().slice(0,10);
  const completedDates = Object.values(state.completed).filter(Boolean);
  const doneToday = completedDates.some(d => d === todayIso);
  
  let streak = 0;
  let check = doneToday ? new Date(today) : new Date(yesterday);
  
  while (true) {
    const iso = check.toISOString().slice(0,10);
    const dayCompleted = completedDates.some(d => d === iso);
    if (dayCompleted) { streak++; check.setDate(check.getDate()-1); }
    else break;
  }
  state.streak = streak;
  saveState();
}

function renderDays(days, todayDay) {

  const t = T[state.lang];
  const filtered = activeModule === 0 ? days : days.filter(d => d.mod === activeModule);
  const container = document.getElementById('days-container');

  container.innerHTML = filtered.map(d => {
    const isDone = !!state.completed[d.day];
    const isToday = d.day === todayDay;
    const isLocked = d.day > todayDay + 1; // allow one ahead
    const isOpen = expanded === d.day;
    const color = M_COLOR[d.mod];
    const bg = M_BG[d.mod];
    const note = state.notes[d.day] || '';

    const cardClass = `day-card${isDone?' done':''}${isLocked?' locked':''}`;

    const checkStyle = isDone
      ? `background:${color};border-color:${color}`
      : `background:transparent;border-color:rgba(0,0,0,0.15)`;

    const bodyHTML = isOpen && !isLocked ? `
      <div class="day-body open" id="body-${d.day}" onclick="event.stopPropagation()">
        <div class="section-label">${t.theory}</div>
        <div class="theory-text">${d.theory}</div>
        <div class="section-label" style="margin-top:1rem">${t.practice}</div>
        <div class="practice-text">${d.practice}</div>
        <div class="timer-box">
          <div>
            <div class="timer-label">${t.timer_label}</div>
            <div class="timer-display" id="timer-display-${d.day}">10:00</div>
          </div>
          <button class="timer-ctrl" onclick="startTimer(${d.day})" id="timer-start-${d.day}">${t.start_timer}</button>
          <button class="timer-ctrl" style="background:#888" onclick="resetTimer(${d.day})">${t.reset_timer}</button>
        </div>
        <div class="section-label" style="margin-top:0.5rem">${t.reflection}</div>
        <div class="reflection-q">${d.reflection}</div>
        <textarea data-day="${d.day}" placeholder="..." oninput="saveNote(${d.day},this.value)">${note}</textarea>
        <button class="done-btn"
          style="background:${isDone?'rgba(0,0,0,0.07)':color};color:${isDone?'#888':'white'}"
          onclick="toggleDone(event,${d.day})">
          ${isDone ? t.unmark : t.mark_done}
        </button>
      </div>` : '';

    const lockedMsg = isLocked ? `<span class="lock-icon">🔒</span>` : '';
    const todayGlow = isToday ? `<div class="today-glow"></div>` : '';

    return `<div class="${isToday?'today-card-wrapper':''}">
      ${todayGlow}
      <div class="${cardClass}" id="card-${d.day}" style="background:${bg}"
        onclick="${isLocked?'':'toggleCard('+d.day+')'}">
        <div class="day-head">
          <div class="day-num" style="color:${color}">${d.day}</div>
          <div class="day-emoji">${d.emoji}</div>
          <div class="day-info">
            <div class="day-title" style="${isDone?'text-decoration:line-through':''}">${d.title}</div>
            <div class="day-tag" style="color:${color}">${d.tag}</div>
          </div>
          ${lockedMsg}
          ${!isLocked ? `<div class="day-check" id="check-${d.day}"
            style="${checkStyle}"
            onclick="toggleDone(event,${d.day})">
            ${isDone?'✓':''}
          </div>` : ''}
        </div>
        ${bodyHTML}
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════
// RENDER OVERVIEW
// ════════════════════════════════════════════════════════════
function renderOverview(days, todayDay) {
  if (!days) days = DAYS_DATA[state.lang];
  if (!todayDay) todayDay = getTodayDayNum();
  const t = T[state.lang];
  const doneCount = Object.keys(state.completed).length;

  document.getElementById('ov-done').textContent = doneCount;
  document.getElementById('ov-done-lbl').textContent = t.done_done;
  document.getElementById('ov-left').textContent = 30 - doneCount;
  document.getElementById('ov-left-lbl').textContent = t.done_left;
  document.getElementById('ov-streak').textContent = state.streak + '🔥';
  document.getElementById('ov-streak-lbl').textContent = t.done_streak;

  const container = document.getElementById('overview-container');

  // Congrats banner if all done
  let banner = '';
  if (doneCount === 30) {
    banner = `<div class="complete-banner">
      <div class="crown">🌟</div>
      <h3>${t.congrats_h}</h3>
      <p>${t.congrats_p}</p>
    </div>`;
  }

  const moduleBlocks = [1,2,3,4].map(modId => {
    const mDays = days.filter(d => d.mod === modId);
    const color = M_COLOR[modId];
    const bg = M_BG[modId];
    const cells = mDays.map(d => {
      const isDone = !!state.completed[d.day];
      const isLocked = d.day > todayDay + 1;
      return `<div class="ov-cell${isLocked?' locked-cell':''}"
        style="background:${isDone?color:bg};color:${isDone?'white':color}"
        title="Day ${d.day}: ${d.title}"
        onclick="${isLocked?'':'switchView(\'program\');filterModule(0,null);expandDay('+d.day+')'}"
        >${isDone?'✓':d.day}</div>`;
    }).join('');
    return `<div class="module-sec-label" style="color:${color};margin-top:1.2rem">
        ${t.mod_filter(modId, t.modules[modId-1])}
      </div>
      <div class="module-sec-title">${t.module_subs[modId-1]}</div>
      <div class="ov-grid">${cells}</div>`;
  }).join('');

  container.innerHTML = banner + moduleBlocks;
}

// ════════════════════════════════════════════════════════════
// RENDER SETTINGS
// ════════════════════════════════════════════════════════════
function renderSettings() {
  const t = T[state.lang];
  document.getElementById('settings-title').textContent = t.settings;
  document.getElementById('set-name-lbl').textContent = t.set_name;
  document.getElementById('set-start-lbl').textContent = t.set_start;
  document.getElementById('set-lang-lbl').textContent = t.set_lang;
  document.getElementById('set-streak-lbl').textContent = t.set_streak;
  document.getElementById('set-name-val').textContent = state.name;
  document.getElementById('set-start-val').textContent = state.startDate || '—';
  document.getElementById('set-lang-val').textContent = state.lang === 'en' ? 'English' : 'Español';
  document.getElementById('set-streak-val').textContent = state.streak + ' 🔥';
  document.getElementById('reset-btn').textContent = t.reset_btn;
}

// ════════════════════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════════════════════
function toggleCard(dayNum) {
  expanded = expanded === dayNum ? null : dayNum;
  renderDays();
}

function expandDay(dayNum) {
  expanded = dayNum;
  renderDays();
  setTimeout(() => {
    const el = document.getElementById('card-'+dayNum);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function toggleDone(e, dayNum) {
  e.stopPropagation();
  const wasNotDone = !state.completed[dayNum];
  if (wasNotDone) {
    const today = new Date().toISOString().slice(0,10);
    state.completed[dayNum] = today;
    updateStreak();
    saveState();
    triggerConfetti();
  } else {
    delete state.completed[dayNum];
    updateStreak();
    saveState();
  }
  renderAll();
}

function saveNote(dayNum, value) {
  state.notes[dayNum] = value;
  saveState();
}

// Emergency save on tab close or page unload — catches anything oninput missed
window.addEventListener('beforeunload', function() {
  // Grab current values from all open textareas and save them
  document.querySelectorAll('textarea[data-day]').forEach(function(ta) {
    var dayNum = parseInt(ta.getAttribute('data-day'));
    if (dayNum && ta.value !== undefined) {
      state.notes[dayNum] = ta.value;
    }
  });
  saveState();
});

function filterModule(modId, btn) {
  activeModule = modId;
  expanded = null;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else {
    // find and activate correct filter btn
    const btns = document.querySelectorAll('.filter-btn');
    btns.forEach((b,i) => { if (i === modId) b.classList.add('active'); });
  }
  renderDays();
}

function switchView(view) {
  currentView = view;
  ['program','overview','settings'].forEach(v => {
    document.getElementById('view-'+v).classList.toggle('hidden', v !== view);
  });
  document.querySelectorAll('.tab').forEach((t,i) => {
    const views = ['program','overview','settings'];
    t.classList.toggle('active', views[i] === view);
  });
  if (view === 'overview') renderOverview();
  if (view === 'settings') renderSettings();
}

function resetProgram() {
  const t = T[state.lang];
  const msg = state.lang === 'en'
    ? 'This will erase all your progress. Are you sure?'
    : '¿Segura de que quieres borrar todo tu progreso?';
  if (!confirm(msg)) return;
  localStorage.removeItem('icm2_state');
  localStorage.removeItem('user_email');
  localStorage.removeItem('bloom_token');
  state = { lang: 'en', name: '', startDate: null, completed: {}, notes: {}, streak: 0, lastCompleted: null };
  document.getElementById('app').style.display = 'none';
  document.getElementById('onboarding').style.display = '';
  document.getElementById('ob-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('ob-name').value = '';
}

// ════════════════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════════════════
function startTimer(dayNum) {
  const btn = document.getElementById('timer-start-'+dayNum);
  const display = document.getElementById('timer-display-'+dayNum);
  const t = T[state.lang];
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    if (btn) btn.textContent = t.start_timer;
  } else {
    timerRunning = true;
    if (btn) btn.textContent = t.stop_timer;
    timerInterval = setInterval(() => {
      timerSeconds--;
      if (timerSeconds <= 0) {
        timerSeconds = 0;
        clearInterval(timerInterval);
        timerRunning = false;
        if (btn) btn.textContent = t.start_timer;
        // Play bell
        playBell();
      }
      if (display) display.textContent = formatTimer(timerSeconds);
    }, 1000);
  }
}

function resetTimer(dayNum) {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 600;
  const display = document.getElementById('timer-display-'+dayNum);
  const btn = document.getElementById('timer-start-'+dayNum);
  const t = T[state.lang];
  if (display) display.textContent = '10:00';
  if (btn) btn.textContent = t.start_timer;
}

function formatTimer(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ════════════════════════════════════════════════════════════
// CONFETTI
// ════════════════════════════════════════════════════════════
function triggerConfetti() {
  const overlay = document.getElementById('confetti-overlay');
  overlay.style.display = 'block';
  overlay.innerHTML = '';
  const colors = ['#c2566a','#4a9e87','#4a6ec2','#a07840','#c8a96e','#f0c4cc'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left: ${Math.random()*100}vw;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay: ${Math.random()*0.5}s;
      animation-duration: ${0.8+Math.random()*0.8}s;
      width: ${6+Math.random()*8}px;
      height: ${6+Math.random()*8}px;
      border-radius: ${Math.random()>0.5?'50%':'2px'};
    `;
    overlay.appendChild(piece);
  }
  setTimeout(() => { overlay.style.display = 'none'; overlay.innerHTML = ''; }, 2000);
}

// ════════════════════════════════════════════════════════════
// AMBIENT AUDIO — Web Audio API (offline)
// ════════════════════════════════════════════════════════════
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.3;
  gainNode.connect(audioCtx.destination);
}

function stopAllSoundNodes() {
  soundNodes.forEach(n => { try { n.stop(); } catch(e){} });
  soundNodes = [];
}

function playNatureAmbient() {
  // Layered sine tones creating a peaceful hum (nature-like)
  const freqs = [55, 110, 164.8, 220, 329.6];
  freqs.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.value = freq;
    lfo.frequency.value = 0.05 + i * 0.02;
    lfoGain.gain.value = freq * 0.1;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    g.gain.value = 0.06 - i * 0.008;

    osc.connect(g);
    g.connect(gainNode);
    osc.start();
    lfo.start();
    soundNodes.push(osc, lfo);
  });
  // Add gentle noise layer
  const bufferSize = audioCtx.sampleRate * 4;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.012;
  const noiseSource = audioCtx.createBufferSource();
  noiseSource.buffer = noiseBuffer;
  noiseSource.loop = true;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'lowpass';
  noiseFilter.frequency.value = 400;
  noiseSource.connect(noiseFilter);
  noiseFilter.connect(gainNode);
  noiseSource.start();
  soundNodes.push(noiseSource);
}

function playRainAmbient() {
  // White noise shaped like rain
  const bufferSize = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) d[i] = (Math.random() * 2 - 1);
  const source = audioCtx.createBufferSource();
  source.buffer = buf;
  source.loop = true;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 600;
  filter.Q.value = 0.5;
  const g = audioCtx.createGain();
  g.gain.value = 0.18;
  source.connect(filter);
  filter.connect(g);
  g.connect(gainNode);
  source.start();
  soundNodes.push(source);

  // Add occasional drop pings
  function addDrop() {
    if (!soundPlaying) return;
    const osc = audioCtx.createOscillator();
    const dg = audioCtx.createGain();
    osc.frequency.value = 1200 + Math.random() * 800;
    osc.type = 'sine';
    dg.gain.setValueAtTime(0.05, audioCtx.currentTime);
    dg.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.connect(dg); dg.connect(gainNode);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    setTimeout(addDrop, 200 + Math.random() * 600);
  }
  setTimeout(addDrop, 500);
}

function playCrystalAmbient() {
  // Crystal bowl overtones
  const freqs = [174, 285, 396, 528, 639, 741, 852];
  freqs.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.value = 0.025;
    osc.connect(g); g.connect(gainNode);
    osc.start();
    soundNodes.push(osc);
  });
  // Occasional crystal ding
  function ding() {
    if (!soundPlaying) return;
    const osc = audioCtx.createOscillator();
    const dg = audioCtx.createGain();
    const f = freqs[Math.floor(Math.random() * freqs.length)];
    osc.frequency.value = f * 2;
    osc.type = 'sine';
    dg.gain.setValueAtTime(0.07, audioCtx.currentTime);
    dg.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
    osc.connect(dg); dg.connect(gainNode);
    osc.start(); osc.stop(audioCtx.currentTime + 2);
    setTimeout(ding, 2000 + Math.random() * 4000);
  }
  setTimeout(ding, 1000);
}

function playBell() {
  initAudio();
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.frequency.value = 528;
  osc.type = 'sine';
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 3);
}

function switchSound(type) {
  currentSoundType = type;
  document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
  const map = { nature: 'nature-btn', rain: 'rain-btn', crystal: 'crystal-btn' };
  document.getElementById(map[type]).classList.add('active');
  if (soundPlaying) {
    stopAllSoundNodes();
    startSound();
  }
}

function startSound() {
  if (currentSoundType === 'nature') playNatureAmbient();
  else if (currentSoundType === 'rain') playRainAmbient();
  else if (currentSoundType === 'crystal') playCrystalAmbient();
}

function toggleSound() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  soundPlaying = !soundPlaying;
  const btn = document.getElementById('sound-toggle-btn');
  const icon = document.getElementById('sound-icon');
  if (soundPlaying) {
    startSound();
    btn.classList.add('active');
    icon.textContent = '♫';
  } else {
    stopAllSoundNodes();
    btn.classList.remove('active');
    icon.textContent = '♪';
  }
}

function setVolume(val) {
  if (!gainNode) return;
  gainNode.gain.value = val / 100 * 0.8;
}

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
// Bind start button properly for mobile
window.addEventListener('DOMContentLoaded', async () => {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('ob-date').value = today;

  // Fix mobile button
  const btn = document.getElementById('ob-btn');
  if (btn) {
    btn.addEventListener('touchend', function(e) {
      e.preventDefault();
      startProgram();
    });
  }
  // Ensure hero-cta visible after 2s fallback
  setTimeout(function() {
    var cta = document.querySelector('.hero-cta');
    if (cta) cta.style.opacity = '1';
  }, 2000);

  // Получаем token — из ?token=, из ?e=email, или из localStorage
  const urlParams = new URLSearchParams(window.location.search);
  const urlEmail = urlParams.get('e');
  let token = getToken();

  // Если в URL есть ?e=email — сначала резолвим токен через воркер
  if (!token && urlEmail) {
    token = await resolveTokenByEmail(urlEmail);
  }

  // Если есть token — всегда грузим с облака первым
  if (token) {
    try {
      const loaded = await loadFromCloud(token);
      if (loaded && state.name && state.startDate) {
        launchApp();
        return;
      }
      // Данные загрузились но name/startDate пусты — покажем онбординг
      // (token уже сохранён в localStorage, saveState() свяжет их)
    } catch(e) { console.log('Cloud load failed, trying local:', e); }
  }

  // Fallback: localStorage (нет интернета или нет токена)
  if (loadState() && state.name && state.startDate) {
    // Есть локальный прогресс — пушим в облако
    const tok = getToken();
    if (tok) {
      fetch(CLOUD_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: tok, progress: state })
      }).catch(function(e) { console.error("Init sync:", e); });
    }
    launchApp();
    return;
  }

  // Показываем онбординг — первый запуск (token уже сохранён, saveState() его подхватит)
});
</script>
